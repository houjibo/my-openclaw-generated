server:
  port: 8080

spring:
  application:
    name: java-agent-prototype

  # Workspace Configuration
  workspace:
    base-dir: ${AGENT_WORKSPACE:~/.openclaw/workspace}
    agents-dir: ${AGENTS_DIR:agents}
    memory-dir: ${MEMORY_DIR:workspace/memory}

  # OpenAI Configuration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/v1
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5.2}
          temperature: ${OPENAI_TEMPERATURE:0.7}
          max-tokens: ${OPENAI_MAX_TOKENS:4000}

  # Anthropic Configuration
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: https://api.anthropic.com/v1
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-5-sonnet}
          temperature: ${ANTHROPIC_TEMPERATURE:0.7}
          max-tokens: ${ANTHROPIC_MAX_TOKENS:8000}

# Agent Configuration
agent:
  default-model: ${DEFAULT_MODEL:openai:gpt-5.2}
  default-temperature: ${DEFAULT_TEMPERATURE:0.7}
  default-max-tokens: ${DEFAULT_MAX_TOKENS:4000}

# A2A Protocol Configuration
a2a:
  enabled: ${A2A_ENABLED:true}
  discovery:
    enabled: ${A2A_DISCOVERY_ENABLED:true}
    port: ${A2A_DISCOVERY_PORT:9090}
  communication:
    protocol: ${A2A_PROTOCOL:http} # http or grpc
    timeout: ${A2A_TIMEOUT:30000} # 30 seconds

# Memory Configuration
memory:
  always-loaded:
    max-size: ${MEMORY_ALWAYS_LOADED_MAX_SIZE:100}
  daily-context:
    retention-days: ${MEMORY_DAILY_RETENTION_DAYS:7}
  deep-knowledge:
    enabled: ${MEMORY_DEEP_ENABLED:true}
    vector-search-enabled: ${MEMORY_VECTOR_SEARCH_ENABLED:true}
    embedding-model: ${MEMORY_EMBEDDING_MODEL:text-embedding-3-small}

# Logging
logging:
  level:
    com.cola.agent: ${LOG_LEVEL:DEBUG}
    org.springframework.ai: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
